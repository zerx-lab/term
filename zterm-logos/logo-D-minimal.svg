<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgD" x1="135deg" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#09090b"/>
    </linearGradient>
    <linearGradient id="accentD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="glowD">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: near-black with subtle warmth -->
  <rect width="512" height="512" rx="96" fill="#0c0c0d"/>

  <!-- Large "Z" centered and bold -->
  <text x="256" y="360"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-size="340"
        font-weight="900"
        fill="white"
        text-anchor="middle"
        dominant-baseline="auto"
        letter-spacing="-10">Z</text>

  <!-- Amber/orange underline stripe — terminal cursor color -->
  <rect x="80" y="375" width="352" height="14" rx="7" fill="url(#accentD)" filter="url(#glowD)"/>

  <!-- Small prompt indicator top-left corner -->
  <text x="60" y="90"
        font-family="'Courier New', monospace"
        font-size="38"
        font-weight="bold"
        fill="#f97316"
        opacity="0.8"
        filter="url(#glowD)">_</text>
</svg>
